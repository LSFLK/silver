apiVersion: v2
name: silver
description: Umbrella chart for Silver mail platform services
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: opendkim
    version: 0.1.0
    repository: file://charts/opendkim
    condition: opendkim.enabled
  - name: redis
    version: 0.1.0
    repository: file://charts/redis
    condition: redis.enabled
  - name: unbound
    version: 0.1.0
    repository: file://charts/unbound
    condition: unbound.enabled
  - name: rspamd
    version: 0.1.0
    repository: file://charts/rspamd
    condition: rspamd.enabled
  - name: clamav
    version: 0.1.0
    repository: file://charts/clamav
    condition: clamav.enabled
