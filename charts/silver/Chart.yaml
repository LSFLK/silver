apiVersion: v2
name: silver
description: Umbrella chart for Silver mail platform services
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: opendkim
    version: 0.1.0
    repository: file://charts/opendkim
    condition: opendkim.enabled
  - name: postfix
    version: 0.1.0
    repository: file://charts/postfix
    condition: postfix.enabled
  - name: redis
    version: 0.1.0
    repository: file://charts/redis
    condition: redis.enabled
  - name: unbound
    version: 0.1.0
    repository: file://charts/unbound
    condition: unbound.enabled
  - name: rspamd
    version: 0.1.0
    repository: file://charts/rspamd
    condition: rspamd.enabled
  - name: seaweedfs
    version: 0.1.0
    repository: file://charts/seaweedfs
    condition: seaweedfs.enabled
  - name: raven
    version: 0.1.0
    repository: file://charts/raven
    condition: raven.enabled
  # Thunder identity server (upstream OCI chart). Mirrors the docker-compose
  # `thunder`/`thunder-setup`/`thunder-db-init` services.
  - name: thunder
    version: 0.32.0
    repository: oci://ghcr.io/asgardeo/helm-charts
    condition: thunder.enabled
