domain: {{ include "raven.domain" . }}
auth_server_url: https://{{ .Values.thunder.host }}:{{ .Values.thunder.port }}/auth/credentials/authenticate

# OAUTHBEARER token validation (RFC 7628). iss must match this public host.
oauth_issuer_url: "https://{{ include "raven.thunderPublicHost" . }}:{{ .Values.thunder.publicPort }}"
oauth_jwks_url: "https://{{ include "raven.thunderPublicHost" . }}:{{ .Values.thunder.publicPort }}/oauth2/jwks"
oauth_audience:
  - "{{ .Values.thunder.audience }}"
oauth_clock_skew_seconds: 60

# S3-Compatible Blob Storage Configuration
blob_storage:
{{- if .Values.blobStorage.enabled }}
  enabled: true
  endpoint: "{{ include "raven.s3Endpoint" . }}"
  region: "{{ .Values.blobStorage.region }}"
  bucket: "{{ .Values.blobStorage.bucket }}"
  access_key: "{{ .Values.blobStorage.accessKey }}"
  secret_key: "{{ include "raven.s3SecretKey" . }}"
  timeout: 30
{{- else }}
  enabled: false
{{- end }}
