apiVersion: v1
kind: Secret
metadata:
  name: {{ include "raven.configSecretName" . }}
  labels:
    {{- include "raven.labels" . | nindent 4 }}
type: Opaque
# In a Secret (not ConfigMap) because both files embed the S3 secret_key.
stringData:
  raven.yaml: |
{{ tpl (.Files.Get "files/raven.yaml") . | indent 4 }}
  delivery.yaml: |
{{ tpl (.Files.Get "files/delivery.yaml") . | indent 4 }}
