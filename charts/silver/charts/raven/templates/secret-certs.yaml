{{- if and .Values.tls.enabled (not .Values.tls.existingSecret) }}
{{- $name := printf "%s-certs" (include "raven.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "raven.labels" . | nindent 4 }}
  annotations:
    # Keep the generated cert stable across upgrades (regenerating would restart
    # the pod and churn TLS on every helm upgrade).
    "helm.sh/resource-policy": keep
type: Opaque
{{- if and $existing (index ($existing.data | default dict) "fullchain.pem") }}
data:
  fullchain.pem: {{ index $existing.data "fullchain.pem" }}
  privkey.pem: {{ index $existing.data "privkey.pem" }}
{{- else }}
{{- $cn := include "raven.mailHostname" . }}
{{- $cert := genSelfSignedCert $cn nil (list $cn (include "raven.domain" .)) 3650 }}
stringData:
  # Filenames Raven expects at {{ .Values.tls.mountPath }}.
  fullchain.pem: |
{{ $cert.Cert | indent 4 }}
  privkey.pem: |
{{ $cert.Key | indent 4 }}
{{- end }}
{{- end }}
