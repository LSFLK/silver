apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "postfix.fullname" . }}-test-connection"
  labels:
    {{- include "postfix.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: smtp-check
      image: busybox
      command: ['sh', '-c']
      args: ['nc -zv {{ include "postfix.fullname" . }} {{ .Values.service.port }}']
  restartPolicy: Never
