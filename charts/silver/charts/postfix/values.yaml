# Default values for postfix.
# Cross-service hostnames, mail domain and TLS Secret are derived from the
# umbrella's `global` block (global.domain, global.serviceNames, global.tlsSecretName).

image:
  repository: ghcr.io/lsflk/silver-smtp
  tag: main
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  # ClusterIP: external mail traffic arrives via hostPort (see below); the Service
  # is for in-cluster resolution and the helm test. Switch to LoadBalancer/NodePort
  # to expose via a Service, in which case externalTrafficPolicy applies.
  type: ClusterIP
  externalTrafficPolicy: Local
  ports:
    smtp: 25
    submission: 587

# hostPort binds 25/587 on the node so Postfix sees the real client IP
# (source IP matters for spam scoring). One pod per host port -> single node.
hostPort:
  enabled: true

probes:
  enabled: true

resources: {}

# Postfix binds privileged ports 25/587. Keep root + NET_BIND_SERVICE for v1;
# full de-root is later hardening.
securityContext:
  runAsUser: 0
  runAsGroup: 0
  capabilities:
    add:
      - NET_BIND_SERVICE
