apiVersion: v1
kind: Pod
metadata:
  name: {{ include "rspamd.fullname" . }}-test
  labels:
    {{- include "rspamd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test-connectivity
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing Rspamd milter connectivity on port 11332..."
          if nc -z -w 2 {{ include "rspamd.fullname" . }} 11332; then
            echo "✓ Milter port 11332 is reachable"
          else
            echo "✗ Milter port 11332 is NOT reachable"
            exit 1
          fi

          {{- if .Values.service.webui.enabled }}
          echo "Testing Rspamd Web UI connectivity on port 11334..."
          if nc -z -w 2 {{ include "rspamd.fullname" . }} 11334; then
            echo "✓ Web UI port 11334 is reachable"
          else
            echo "✗ Web UI port 11334 is NOT reachable"
            exit 1
          fi
          {{- end }}

          echo "All Rspamd connectivity tests passed!"
  restartPolicy: Never
