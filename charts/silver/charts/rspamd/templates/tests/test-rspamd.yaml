apiVersion: v1
kind: Pod
metadata:
  name: {{ include "rspamd.fullname" . }}-test
  labels:
    helm.sh/chart: {{ include "rspamd.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    # matches the NetworkPolicy's milter ingress selector so this test can
    # actually reach port 11332, same as a real SMTP client would.
    app.kubernetes.io/name: smtp
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test-connectivity
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      command:
        - /bin/bash
        - -c
        - |
          echo "Testing Rspamd milter connectivity on port 11332..."
          if timeout 2 bash -c "echo > /dev/tcp/{{ include "rspamd.fullname" . }}/11332" >/dev/null 2>&1; then
            echo "✓ Milter port 11332 is reachable"
          else
            echo "✗ Milter port 11332 is NOT reachable"
            exit 1
          fi

          {{- if .Values.service.webui.enabled }}
          echo "Testing Rspamd Web UI connectivity on port 11334..."
          if timeout 2 bash -c "echo > /dev/tcp/{{ include "rspamd.fullname" . }}/11334" >/dev/null 2>&1; then
            echo "✓ Web UI port 11334 is reachable"
          else
            echo "✗ Web UI port 11334 is NOT reachable"
            exit 1
          fi
          {{- end }}

          echo "All Rspamd connectivity tests passed!"
  restartPolicy: Never
