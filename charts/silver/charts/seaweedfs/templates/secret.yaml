{{- $secretKey := include "seaweedfs.secretKey" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "seaweedfs.secretName" . }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
  annotations:
    # Preserve auto-generated secretKey across upgrades; the helper reads it back
    # via lookup so this Secret is never regenerated with a new key.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  accessKey: {{ .Values.s3.accessKey | quote }}
  secretKey: {{ $secretKey | quote }}
  # s3-config.json lives here (not a ConfigMap) because it embeds secretKey —
  # keeping it in the Secret makes the key single-sourced and avoids drift.
  s3-config.json: |
    {
      "identities": [
        {
          "name": {{ .Values.s3.identityName | quote }},
          "credentials": [
            {
              "accessKey": {{ .Values.s3.accessKey | quote }},
              "secretKey": {{ $secretKey | quote }}
            }
          ],
          "actions": ["Admin", "Read", "Write"]
        }
      ]
    }
