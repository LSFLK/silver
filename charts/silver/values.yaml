global:
  imagePullSecrets: []

opendkim:
  enabled: true

redis:
  enabled: false

unbound:
  enabled: false

rspamd:
  enabled: false
  
tls:
  enabled: true
  issuer: le-staging # switch to le-prod once staging works
  renewBefore: "720h" # renew 30 days before expiry
  domains: [
    "mail.example.com", "example.com"
  ]
