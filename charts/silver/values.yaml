global:
  domain: ""                 # required; e.g. example.com. Everything derives from it.
  mailHostname: ""           # default mail.<domain>
  tlsSecretName: ""          # default mail-<domain>-tls (matches certificate.yaml naming)
  # Stable, release-independent Service names so vendored subchart configs resolve
  # in-cluster (postfix main.cf points at these). Each service chart must create a
  # Service with the matching name.
  serviceNames:
    raven: raven
    rspamd: rspamd
    opendkim: opendkim
    s3: seaweedfs-s3
  # Shared S3 credentials so seaweedfs (server) and raven (client) always agree.
  # secretKey "" => both charts DERIVE the same key from the release name
  # (deterministic, no cross-lookup) so a fresh one-command install matches out
  # of the box. Set a real secretKey in prod.
  s3:
    accessKey: raven
    secretKey: ""
    bucket: email-attachments
  imagePullSecrets: []
  # TLS lives under global so subcharts (postfix) can gate their config on it,
  # not just the umbrella's certificate.yaml.
  tls:
    enabled: true
    issuer: le-staging # switch to le-prod once staging works
    renewBefore: "720h" # renew 30 days before expiry
    # Empty -> derives [ mail.<domain>, <domain> ] from global.domain, so the
    # cert Secret postfix mounts (silver.tlsSecretName) always exists. Override
    # only to add extra SANs.
    domains: []
  # SASL auth is served by raven. Disable for a raven-less standalone bring-up
  # (postfix still accepts mail on 25; submission works without auth).
  sasl:
    enabled: true

opendkim:
  enabled: true

postfix:
  enabled: true

redis:
  enabled: false

unbound:
  enabled: false

rspamd:
  enabled: false

raven:
  enabled: true

seaweedfs:
  enabled: true
  s3:
    accessKey: raven
    secretKey: ""
    bucket: email-attachments
